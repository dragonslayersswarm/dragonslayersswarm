<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dragon Slayers — Co-op</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js"></script>
<style>
  :root{
    --ink:#0B0A0F; --parchment:#E8DCC0; --bone:#9A927F; --gold:#C9A227; --accent:#2C59FA;
    --display:Georgia,'Times New Roman',serif;
    --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    --body:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:radial-gradient(120% 120% at 50% 0%,#16131d 0%,#0B0A0F 60%);
    color:var(--parchment);font-family:var(--body);overflow:hidden}
  #app{position:fixed;inset:0;display:grid;place-items:center;overflow-y:auto}
  .hidden{display:none !important}

  /* ---------- LOBBY ---------- */
  .lobby{width:min(560px,94vw);text-align:center;padding:2rem 1rem}
  .lobby h1{font-family:var(--display);font-size:2rem;margin-bottom:.3rem}
  .lobby .sub{font-family:var(--mono);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--bone);margin-bottom:1.6rem}
  .panel{border:1px solid rgba(232,220,192,.14);background:rgba(255,255,255,.02);padding:1.3rem;margin-bottom:1rem}
  .panel h2{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--bone);margin-bottom:.9rem}
  .field{display:flex;gap:.6rem;margin-bottom:.6rem}
  input[type=text]{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(232,220,192,.2);color:var(--parchment);
    font-family:var(--mono);font-size:.9rem;padding:.7rem .9rem;outline:none}
  input[type=text]:focus{border-color:var(--gold)}
  .btn{background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:var(--mono);
    font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;padding:.7rem 1.2rem;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn:hover:not(:disabled){background:var(--gold);color:var(--ink)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn--full{width:100%}
  .btn--accent{border-color:var(--accent);color:#8FB0FF}
  .btn--accent:hover:not(:disabled){background:var(--accent);color:#fff}
  .or{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;color:var(--bone);margin:1rem 0}
  .roomcode{font-family:var(--mono);font-size:1.9rem;letter-spacing:.4em;color:var(--gold);padding:.5rem 0}
  .status{font-family:var(--mono);font-size:.68rem;color:var(--bone);margin-top:.8rem;min-height:1.2em}
  .status.err{color:#E0663D}
  .status.ok{color:#5FBF6F}
  .peerlist{list-style:none;text-align:left;margin-top:.8rem;font-family:var(--mono);font-size:.74rem}
  .peerlist li{padding:.3rem 0;display:flex;align-items:center;gap:.5rem}
  .peerlist li::before{content:'●';font-size:.6rem}

  /* order picker */
  .orders{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}
  .ord{border:1px solid rgba(232,220,192,.16);background:rgba(255,255,255,.02);padding:.7rem .4rem;cursor:pointer;transition:all .14s}
  .ord:hover{border-color:var(--gold);transform:translateY(-2px)}
  .ord.on{border-color:var(--gold);background:rgba(201,162,39,.12)}
  .ord .on-nm{font-family:var(--display);font-size:.86rem;font-weight:700}
  .ord .on-rl{font-family:var(--mono);font-size:.5rem;letter-spacing:.14em;text-transform:uppercase;color:var(--bone);margin-top:.2rem}
  .ord .on-ab{font-family:var(--body);font-size:.62rem;color:var(--bone);margin-top:.3rem;font-style:italic}

  /* ---------- GAME ---------- */
  #game{position:fixed;inset:0;display:none}
  #game.on{display:block}
  canvas{display:block;width:100%;height:100%}
  #hud{position:fixed;top:10px;left:10px;font-family:var(--mono);font-size:.68rem;
    background:rgba(6,5,10,.6);border:1px solid rgba(232,220,192,.14);padding:.5rem .7rem;pointer-events:none;line-height:1.6}
  #hud b{color:var(--gold)}
  #roster{position:fixed;top:10px;right:10px;font-family:var(--mono);font-size:.64rem;
    background:rgba(6,5,10,.6);border:1px solid rgba(232,220,192,.14);padding:.5rem .7rem;pointer-events:none;line-height:1.7;min-width:150px}
  #roster .r-row{display:flex;justify-content:space-between;gap:.7rem}
  #roster .r-dead{opacity:.45;text-decoration:line-through}
  #hpbar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:min(340px,80vw);height:14px;
    background:rgba(0,0,0,.6);border:1px solid rgba(232,220,192,.22);pointer-events:none}
  #hpfill{height:100%;width:100%;background:linear-gradient(90deg,#8B2E2E,#C0503A);transition:width .12s}
  #xpbar{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);width:min(340px,80vw);height:5px;
    background:rgba(0,0,0,.6);border:1px solid rgba(232,220,192,.16);pointer-events:none}
  #xpfill{height:100%;width:0%;background:var(--gold)}
  #banner{position:fixed;top:38%;left:0;right:0;text-align:center;font-family:var(--display);
    font-size:clamp(1.4rem,4vw,2.4rem);letter-spacing:.1em;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity .3s}
  #banner.on{opacity:1}
  #banner .b-sub{font-family:var(--body);font-size:.9rem;letter-spacing:0;text-transform:none;color:var(--bone);font-style:italic;margin-top:.3rem}
  /* spectate */
  #spectate{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);text-align:center;
    font-family:var(--mono);font-size:.72rem;background:rgba(6,5,10,.8);border:1px solid rgba(224,102,61,.5);
    padding:.7rem 1.1rem;pointer-events:none;line-height:1.7}
  #spectate .sp-h{color:#E0663D;letter-spacing:.16em;text-transform:uppercase;font-size:.64rem}
  #spectate .sp-w{color:var(--parchment);font-size:.9rem;margin-top:.2rem}
  #spectate .sp-k{color:var(--bone);font-size:.6rem;margin-top:.35rem}
  #leave{position:fixed;bottom:10px;right:10px;z-index:5}
  /* shared level-up draft */
  #draft{position:fixed;inset:0;z-index:38;display:none;place-items:center;
    background:rgba(6,5,10,.9);backdrop-filter:blur(3px)}
  #draft.on{display:grid}
  .d-wrap{text-align:center;width:min(680px,94vw);padding:1.5rem}
  .d-h{font-family:var(--display);font-size:clamp(1.4rem,4vw,2rem);color:var(--gold);letter-spacing:.08em}
  .d-sub{font-family:var(--body);font-style:italic;color:var(--bone);margin:.3rem 0 1.5rem;font-size:.88rem}
  .d-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem}
  @media(max-width:620px){ .d-cards{grid-template-columns:1fr} }
  .dcard{background:rgba(255,255,255,.02);border:1px solid rgba(232,220,192,.16);
    padding:1.1rem .8rem;cursor:pointer;transition:all .14s;text-align:center;color:inherit}
  .dcard:hover{border-color:var(--dc,#C9A227);background:rgba(255,255,255,.05);transform:translateY(-3px)}
  .dcard.on{border-color:var(--dc,#C9A227);background:rgba(201,162,39,.14)}
  .d-nm{font-family:var(--display);font-size:1rem;color:var(--parchment);margin-bottom:.35rem}
  .d-ds{font-family:var(--body);font-size:.78rem;color:var(--bone);line-height:1.4}
  .d-wait{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;color:var(--bone);margin-top:1.3rem}
  .d-timer{color:var(--gold);margin-left:.5rem}
  /* end-of-run summary */
  #endscreen{position:fixed;inset:0;z-index:40;display:none;place-items:center;
    background:rgba(8,6,10,.94);backdrop-filter:blur(4px);overflow-y:auto}
  #endscreen.on{display:grid}
  .e-wrap{text-align:center;padding:2rem 1rem;width:min(560px,94vw)}
  .e-wrap h1{font-family:var(--display);font-size:clamp(1.5rem,5vw,2.4rem);letter-spacing:.08em}
  .e-sub{font-family:var(--body);font-style:italic;color:var(--bone);margin:.4rem 0 1.6rem}
  .e-stats{display:flex;gap:2rem;justify-content:center;margin-bottom:1.6rem}
  .e-stats div{font-family:var(--mono);font-size:.56rem;letter-spacing:.2em;color:var(--bone);display:flex;flex-direction:column;gap:.3rem}
  .e-stats b{font-family:var(--display);font-size:1.5rem;color:var(--parchment);letter-spacing:0}
  .e-roster{border-top:1px solid rgba(232,220,192,.14);padding-top:1rem;margin-bottom:1.6rem}
  .e-row{display:grid;grid-template-columns:24px 1fr auto auto auto;gap:.7rem;align-items:baseline;
    padding:.5rem 0;border-bottom:1px solid rgba(232,220,192,.06);font-family:var(--mono);font-size:.7rem;text-align:left}
  .e-rank{color:var(--gold)}
  .e-nm{font-family:var(--display);font-size:.9rem}
  .e-or{color:var(--bone);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase}
  .e-k{color:var(--parchment)}
  .e-st{color:var(--bone);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em}
  .help{position:fixed;bottom:10px;left:10px;font-family:var(--mono);font-size:.58rem;color:var(--bone)}
</style>
</head>
<body>
<div id="app">
  <div class="lobby" id="lobby">
    <h1>Dragon Slayers</h1>
    <div class="sub">Co-operative Hunt <span style="opacity:.5">· build 8</span></div>

    <div class="panel" id="panel-name">
      <h2>Your name</h2>
      <div class="field"><input type="text" id="name-input" placeholder="slayer name" maxlength="14" autocomplete="off"></div>
      <h2 style="margin-top:1.1rem">Choose your order</h2>
      <div class="orders" id="order-grid"></div>
    </div>

    <div class="panel" id="panel-choose">
      <h2>Host a new hunt</h2>
      <button class="btn btn--full" id="btn-host">Create Room</button>
      <div class="or">— or —</div>
      <h2>Join a friend</h2>
      <div class="field">
        <input type="text" id="join-input" placeholder="room code" maxlength="6" autocomplete="off" style="text-transform:uppercase">
        <button class="btn btn--accent" id="btn-join">Join</button>
      </div>
    </div>

    <div class="panel hidden" id="panel-room">
      <h2 id="room-title">Room</h2>
      <div class="roomcode" id="room-code">------</div>
      <div style="font-size:.68rem;color:var(--bone);font-family:var(--mono)">share this code with your friends</div>
      <ul class="peerlist" id="peer-list"></ul>
      <button class="btn btn--full" id="btn-start" style="margin-top:1rem">Begin the Hunt</button>
    </div>

    <div class="status" id="status"></div>
    <div style="margin-top:1.4rem">
      <a href="index.html" style="font-family:var(--mono);font-size:.6rem;letter-spacing:.16em;
        text-transform:uppercase;color:var(--bone);text-decoration:none">← single player</a>
    </div>
  </div>
</div>

<div id="game">
  <canvas id="cv"></canvas>
  <div id="hud"></div>
  <div id="roster"></div>
  <div id="xpbar"><div id="xpfill"></div></div>
  <div id="hpbar"><div id="hpfill"></div></div>
  <div id="banner"></div>
  <div id="spectate" class="hidden"></div>
  <div id="draft"></div>
  <button class="btn" id="leave">Leave</button>
  <div class="help">WASD move · arts strike on their own</div>
</div>
<script>
"use strict";
/* =====================================================================
   DRAGON SLAYERS — CO-OP (PHASE 2)
   Host-authoritative multiplayer. Separate from the single-player game.

   ARCHITECTURE
   - The HOST simulates everything that must be agreed upon: enemy spawning,
     enemy movement, damage, deaths, drops. It broadcasts a world snapshot
     ~15x/sec. Joiners render what they are told.
   - JOINERS simulate only their own movement (so their input feels instant)
     and send their position + attack events to the host.
   - This makes desync structurally impossible: there is exactly one truth.
     The cost is a little latency on enemy reactions for joiners, which is
     unnoticeable for a casual co-op survivor.
   - DEATH: a dead player spectates, cycling teammates with arrow keys. A
     living teammate can charge a Revive Shrine to bring everyone back at it.
   ===================================================================== */

const WORLD = {
  SEND_HZ: 20,            // player position broadcasts / sec
  SNAP_HZ: 10,            // host world snapshots / sec
  PLAYER_R: 15,
  MOVE: 300,
  MAX_ENEMIES: 110,       // lower than single-player: this all crosses the wire
  RUN_LENGTH: 600,
};
const PLAYER_COLORS = ['#C9A227','#5FBF6F','#B48CE6','#E0663D','#3FA9A0','#FF8C3A'];

/* ---- ORDERS. A trimmed set for co-op: each has one signature auto-attack,
   tuned so the roles feel different without needing all 81 arts. ---- */
const ORDERS = {
  ember:  { name:'Ember',  role:'Ravager',    c:'#FF6B2C', c2:'#FFC46B', hp:105, dmg:1.18, speed:172,
            sex:'m', art:'bolt',  artName:'Cinderbolt', desc:'a piercing bolt of fire' },
  tide:   { name:'Tide',   role:'Warden',     c:'#2FA8E0', c2:'#9EE6FF', hp:150, dmg:0.80, speed:152,
            sex:'f', art:'aura',  artName:'Undertow',   desc:'a drowning aura around you' },
  thorn:  { name:'Thorn',  role:'Warden',     c:'#4FBF5F', c2:'#B9F5A0', hp:140, dmg:0.85, speed:156,
            sex:'f', art:'zone',  artName:'Bramble',    desc:'thorns that erupt from the ground' },
  stone:  { name:'Stone',  role:'Warden',     c:'#A98262', c2:'#E0C39C', hp:160, dmg:0.78, speed:148,
            sex:'m', art:'nova',  artName:'Tremor',     desc:'a shockwave burst' },
  forge:  { name:'Forge',  role:'Ravager',    c:'#A9B3BE', c2:'#E6EEF5', hp:110, dmg:1.15, speed:168,
            sex:'m', art:'bolt',  artName:'Ironshot',   desc:'a heavy iron spike' },
  gale:   { name:'Gale',   role:'Skirmisher', c:'#7FD8D0', c2:'#D6FFFB', hp:88,  dmg:1.00, speed:198,
            sex:'m', art:'orbit', artName:'Windring',   desc:'blades that circle you' },
  dawn:   { name:'Dawn',   role:'Skirmisher', c:'#FFD860', c2:'#FFF6D0', hp:96,  dmg:0.92, speed:180,
            sex:'m', art:'nova',  artName:'Sunburst',   desc:'a burst of holy light' },
  umbral: { name:'Umbral', role:'Skirmisher', c:'#9B6BD6', c2:'#DDBBFF', hp:86,  dmg:1.10, speed:190,
            sex:'f', art:'bolt',  artName:'Nightfang',  desc:'a fang of shadow' },
  storm:  { name:'Storm',  role:'Ravager',    c:'#F2E14C', c2:'#FFFBB0', hp:92,  dmg:1.22, speed:186,
            sex:'m', art:'chain', artName:'Arcjump',    desc:'lightning that leaps between foes' },
};
/* BIOMES — same palettes as single-player. The current biome is derived from
   the synced game clock, so every client computes the same one without any
   extra network traffic. Ground textures load from art/<tex>.webp exactly as
   they do in the single-player game. */
const BIOMES=[
  { id:'volcanic', name:'Volcanic Wastes', bg:'#170B08', grid:'rgba(255,120,60,.05)',  tex:'volcanic-wastes', tint:'#3A1D12' },
  { id:'storm',    name:'Storm Peaks',     bg:'#0A0E1B', grid:'rgba(140,190,255,.055)',tex:'storm-peaks',     tint:'#1B2438' },
  { id:'coast',    name:'Sunken Coast',    bg:'#07151A', grid:'rgba(90,220,220,.05)',  tex:'sunken-coast',    tint:'#123038' },
  { id:'jungle',   name:'Deep Jungle',     bg:'#0A1510', grid:'rgba(110,220,130,.05)', tex:'deep-jungle',     tint:'#12301B' },
  { id:'caverns',  name:'Cavern Depths',   bg:'#0F0A13', grid:'rgba(185,145,225,.05)', tex:'cavern-depths',   tint:'#241832' },
  { id:'marsh',    name:'Twilight Marsh',  bg:'#0C0910', grid:'rgba(165,145,205,.05)', tex:'twilight-marsh',  tint:'#1E1A2E' },
];
const BIOME_EVERY=100;                       // seconds per biome
function biome(){ return BIOMES[Math.floor(G.t/BIOME_EVERY)%BIOMES.length]; }

// lazily-loaded ground textures, identical convention to single-player
const _texCache={};
function groundTexture(texId){
  if(!texId) return null;
  let e=_texCache[texId];
  if(!e){
    e=_texCache[texId]={img:new Image(),ready:false};
    e.img.onload=()=>{e.ready=true;};
    e.img.onerror=()=>{e.failed=true;};
    e.img.src='art/'+texId+'.webp';
  }
  return e.ready?e:null;
}

/* WYRMHOARD RELICS — buried across the world.
   OWNERSHIP: whoever reaches one first claims it, and that spot is spent for
   everyone. No duplication, no party farming the same relic; a relic you find
   is genuinely yours, and the race to reach it is part of playing together. */
const RELICS={
  embercrown:{ name:'The Ember Crown', c:'#FF6B2C', boon:'+25% damage',        apply:p=>p.up.dmg+=2 },
  tidepearl: { name:'The Tide Pearl',  c:'#2FA8E0', boon:'+2.5 health regen',  apply:p=>p.regen=(p.regen||0)+2.5 },
  thornheart:{ name:'The Thornheart',  c:'#4FBF5F', boon:'+40 max health',     apply:p=>{p.maxhp+=40;p.hp=Math.min(p.maxhp,p.hp+40);} },
  stormeye:  { name:"The Storm's Eye", c:'#F2E14C', boon:'+50% cast speed',    apply:p=>p.up.cd+=5 },
  ironscale: { name:'The Iron Scale',  c:'#A9B3BE', boon:'+15% armour',        apply:p=>p.armor=(p.armor||0)+0.15 },
  shadowfang:{ name:'The Shadow Fang', c:'#9B6BD6', boon:'+35% damage',        apply:p=>p.up.dmg+=3 },
  sunhymn:   { name:'The Sun Hymn',    c:'#FFD860', boon:'+30% reach',         apply:p=>p.up.area+=2 },
  wyrmcrown: { name:'The Wyrmcrown',   c:'#E8C86A', boon:'the greatest hoard', apply:p=>{p.up.dmg+=2;p.up.cd+=1;p.maxhp+=20;p.hp+=20;} },
};
const RELIC_KEYS=Object.keys(RELICS);
const RELIC_R=34;
function seedRelics(){
  // deterministic, like the shrines, so everyone sees the same buried hoard
  const r=mulberry32(Net.seed^0x5EED1);
  G.relics=[];
  for(let i=0;i<12;i++){
    const a=r()*6.2832, dist=700+r()*3000;
    G.relics.push({ id:i, kind:RELIC_KEYS[(r()*RELIC_KEYS.length)|0],
      x:Math.cos(a)*dist, y:Math.sin(a)*dist, taken:false, by:null });
  }
}
// host only: first living slayer to touch a relic claims it outright
function tickRelics(){
  if(!Net.isHost) return;
  for(const rel of G.relics){
    if(rel.taken) continue;
    for(const p of Net.players.values()){
      if(!p.alive) continue;
      if(Math.hypot(p.x-rel.x,p.y-rel.y)<RELIC_R+WORLD.PLAYER_R){
        rel.taken=true; rel.by=p.id;
        const R=RELICS[rel.kind];
        if(R&&R.apply) R.apply(p);
        hostEvent({t:'ev',k:'relic',rid:rel.id,kind:rel.kind,who:p.id,name:p.name});
        break;
      }
    }
  }
}

const ORDER_KEYS = Object.keys(ORDERS);

/* ====================================================================
   SPRITES — ported verbatim from the single-player game so co-op looks
   like the same game. Sprite art has nothing to do with networking; the
   maps, palettes and painter below are identical to single-player.
   ==================================================================== */
const SPRITE = {
  // shared palette keys resolved per-creature at draw time:
  //   D dark   B body   L light/belly   H highlight/horn   K eye ink   W white(flash)
  // frame A / frame B differ only where motion lives (wings, coils).

  drake: { w:16, h:16, cell:2.0, frames:[[
    "................",
    "................",
    ".......HH.......",
    "......HBBH......",
    ".....DBBBBD.....",
    "....DBBBBBBD....",
    "...DBBLLLLBBD...",
    "...DBLLLLLLBD...",
    "...DBBLLLLBBD...",
    "....BB KK BB....",
    "....DB....BD....",
    ".....D....D.....",
    "................",
    "................",
    "................",
    "................",
  ],[
    "................",
    ".......HH.......",
    "......HBBH......",
    "......DBBD......",
    ".....DBBBBD.....",
    "....DBBBBBBD....",
    "...DBBLLLLBBD...",
    "...DBLLLLLLBD...",
    "...DBBLLLLBBD...",
    "....BB KK BB....",
    ".....DBBBBD.....",
    "....D......D....",
    "................",
    "................",
    "................",
    "................",
  ]]},

  // WYVERN — the flap is the whole read. Big wings, up on frame A, down on B.
  wyvern: { w:16, h:16, cell:2.2, fly:true, frames:[[
    "................",
    "DD............DD",
    ".DDD........DDD.",
    "..DBD......DBD..",
    "...DBB.HH.BBD...",
    "....DBBBBBBBD...",
    ".....BBLLLBB....",
    ".....BLLLLLB....",
    "....DBBLLLBBD...",
    ".....BB..BB.....",
    "......BKKB......",
    ".......BB.......",
    "......D..D......",
    "................",
    "................",
    "................",
  ],[
    "................",
    "................",
    "..D........D....",
    "..DBD.HH..DBD...",
    "...DBBBBBBBBD...",
    "....BBBBBBBB....",
    "..DDBBLLLBB DD..",
    ".DD.BLLLLLB..DD.",
    "D...BBLLLBB...D.",
    ".....BB..BB.....",
    "......BKKB......",
    ".......BB.......",
    "......D..D......",
    "................",
    "................",
    "................",
  ]]},

  // SALAMANDER — low, long, a tail-flick between frames. Charge glow is drawn separately.
  salamander: { w:16, h:16, cell:2.2, frames:[[
    "................",
    "................",
    "............HH..",

/* ---- BOSSES: 32x32. Bigger canvas = real silhouette + one mechanic tell each.
   Same palette letters (D B L H K W), plus per-boss accents baked as literal
   chars mapped in bossPalette(). These are the things the player stares at. */

function shade(hex, f){
  const n = parseInt(hex.slice(1),16);
  const r = Math.round(((n>>16)&255)*f), g = Math.round(((n>>8)&255)*f), b = Math.round((n&255)*f);
  return `rgb(${r},${g},${b})`;
}

function spritePalette(e){
  return { D:shade(e.c,0.55), B:e.c, L:e.c2, H:e.c2, K:'#160b1f', W:'#ffffff' };
}

function drawSprite(def, frameIdx, cx, cy, pal, scale, flash){
  const rows = def.frames[frameIdx % def.frames.length];
  const cell = def.cell * scale;
  const ox = cx - (def.w * cell)/2;
  const oy = cy - (def.h * cell)/2;
  for(let y=0;y<def.h;y++){
    const line = rows[y];
    for(let x=0;x<def.w;x++){
      const ch = line[x];
      if(ch === '.' || ch === ' ' || ch === undefined) continue;
      ctx.fillStyle = flash ? '#ffffff' : (pal[ch] || pal.B);
      // +0.5 overdraw kills hairline seams between cells on fractional scales
      ctx.fillRect((ox + x*cell)|0, (oy + y*cell)|0, Math.ceil(cell)+0.5, Math.ceil(cell)+0.5);
    }
  }
}

// ---------- deterministic PRNG ----------
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function cellHash(cx,cy){ let h=(cx*374761393+cy*668265263)|0; h=(h^(h>>>13))*1274126177|0; return (h^(h>>>16))>>>0; }

const Net = {
  peer:null, isHost:false, roomCode:null, myId:null, myName:'slayer', myOrder:'ember',
  conns:new Map(), players:new Map(), seed:0, started:false, onRoster:null,
};
function makeRoomCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s='';
  for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function roomToPeerId(code){ return 'dslayers-co-'+code; }
function setStatus(msg,cls){
  const el=document.getElementById('status');
  el.textContent=msg||''; el.className='status'+(cls?' '+cls:'');
}

function hostRoom(){
  Net.isHost=true; Net.roomCode=makeRoomCode(); Net.myId='host';
  Net.seed=(Math.random()*0xffffffff)>>>0;
  setStatus('opening room…');
  Net.peer=new Peer(roomToPeerId(Net.roomCode),{debug:1});
  Net.peer.on('open',()=>{
    addPlayer({id:'host',name:Net.myName,color:PLAYER_COLORS[0],order:Net.myOrder});
    showRoom(); setStatus('room open — waiting for friends','ok');
  });
  Net.peer.on('connection',conn=>{
    conn.on('open',()=>{
      Net.conns.set(conn.peer,conn);
      conn.on('data',d=>handleData(conn.peer,conn,d));
      conn.on('close',()=>{ removePlayer(conn.peer); broadcastRoster(); });
    });
  });
  Net.peer.on('error',err=>{ console.error(err); setStatus('connection error: '+err.type,'err'); });
}

function joinRoom(code){
  Net.isHost=false; Net.roomCode=code;
  setStatus('connecting to room '+code+'…');
  Net.peer=new Peer({debug:1});
  Net.peer.on('open',myPeerId=>{
    const conn=Net.peer.connect(roomToPeerId(code),{reliable:false});
    let opened=false;
    conn.on('open',()=>{
      opened=true; Net.conns.set('host',conn);
      conn.send({t:'hello',name:Net.myName,order:Net.myOrder,peerId:myPeerId});
      conn.on('data',d=>handleData('host',conn,d));
      conn.on('close',()=>setStatus('lost connection to host','err'));
    });
    setTimeout(()=>{ if(!opened) setStatus('could not find room '+code+' — check the code','err'); },6000);
  });
  Net.peer.on('error',err=>{
    console.error(err);
    setStatus(err.type==='peer-unavailable' ? ('no room with code '+code) : ('connection error: '+err.type),'err');
  });
}

function handleData(fromId,conn,d){
  switch(d.t){
    case 'hello': {
      const idx=Net.players.size%PLAYER_COLORS.length;
      addPlayer({id:fromId,name:(d.name||'slayer').slice(0,14),color:PLAYER_COLORS[idx],order:d.order||'ember'});
      conn.send({t:'welcome',id:fromId,seed:Net.seed,roster:rosterArray()});
      broadcastRoster();
      break;
    }
    case 'welcome': {
      Net.myId=d.id; Net.seed=d.seed; applyRoster(d.roster);
      showRoom(); setStatus('joined! waiting for the host to begin','ok');
      break;
    }
    case 'roster': applyRoster(d.roster); break;
    case 'start':  beginGame(); break;
    // --- a joiner telling the host where they are / what they did ---
    case 'pos': {
      const p=Net.players.get(d.id);
      if(p){ p.tx=d.x; p.ty=d.y; p.aim=d.a; }
      // star topology: joiners only talk to the host, so the host must pass
      // each position on to everyone else or joiners can't see each other
      if(Net.isHost) relayExcept(fromId,d);
      break;
    }
    // --- a joiner reporting they hit something; only the host acts on it ---
    case 'hit': if(Net.isHost) hostApplyDamage(d.id,d.d,d.by); break;
    // --- a slayer has chosen their level-up upgrade ---
    case 'pick': if(Net.isHost) hostReceivePick(d.id,d.up); break;
    // --- somebody attacked: render it so teammates aren't silently fighting ---
    case 'atk':
      spawnRemoteAttack(d);
      if(Net.isHost) relayExcept(fromId,d);   // host passes it on to everyone else
      break;
    // --- host's authoritative world snapshot ---
    case 'snap': applySnapshot(d); break;
    // --- one-off events the host announces ---
    case 'ev': applyEvent(d); break;
  }
}
function rosterArray(){
  return [...Net.players.values()].map(p=>({id:p.id,name:p.name,color:p.color,order:p.order}));
}
function applyRoster(arr){
  for(const r of arr) if(!Net.players.has(r.id)) addPlayer(r);
  const ids=new Set(arr.map(r=>r.id));
  for(const id of [...Net.players.keys()]) if(!ids.has(id)&&id!==Net.myId) Net.players.delete(id);
  if(Net.onRoster) Net.onRoster();
}
function broadcastRoster(){ sendAll({t:'roster',roster:rosterArray()}); if(Net.onRoster) Net.onRoster(); }
function sendAll(msg){ for(const c of Net.conns.values()) try{ c.send(msg); }catch(e){} }
function sendHost(msg){ const c=Net.conns.get('host'); if(c) try{ c.send(msg); }catch(e){} }
function relayExcept(exceptId,msg){
  for(const [pid,c] of Net.conns) if(pid!==exceptId) try{ c.send(msg); }catch(e){}
}
// tell everyone else I attacked, so my art is visible on their screen
function broadcastAttack(kind,ang){
  const msg={t:'atk',id:Net.myId,k:kind,a:Math.round(ang*100)/100};
  if(Net.isHost) sendAll(msg); else sendHost(msg);
}
// draw a teammate's attack locally (visual only — no damage, the host owns that)
function spawnRemoteAttack(d){
  if(d.id===Net.myId) return;
  const p=Net.players.get(d.id); if(!p) return;
  const O=ORDERS[p.order]||ORDERS.ember;
  const ang=d.a;
  switch(d.k){
    case 'bolt':
      G.bullets.push({owner:d.id,x:p.x,y:p.y,vx:Math.cos(ang)*560,vy:Math.sin(ang)*560,
        r:10,dmg:0,c:O.c,c2:O.c2,pierce:99,life:1.6,hit:new Set()});
      break;
    case 'nova':  spawnFx({type:'nova',x:p.x,y:p.y,r:8,max:150,c:O.c2,owner:d.id}); break;
    case 'aura':  spawnFx({type:'aura',x:p.x,y:p.y,r:105,life:0.45,max:0.45,c:O.c2,owner:d.id}); break;
    case 'zone':  spawnFx({type:'zone',x:p.x+Math.cos(ang)*140,y:p.y+Math.sin(ang)*140,r:92,life:3.2,max:3.2,c:O.c2,owner:d.id}); break;
    case 'orbit': spawnFx({type:'orbit',owner:d.id,life:2.4,max:2.4,c:O.c2,n:3,ph:0}); break;
    case 'chain': spawnFx({type:'arc',x1:p.x,y1:p.y,x2:p.x+Math.cos(ang)*200,y2:p.y+Math.sin(ang)*200,life:.18,max:.18,c:O.c2}); break;
  }
}

function addPlayer(p){
  if(Net.players.has(p.id)) return;
  const O=ORDERS[p.order]||ORDERS.ember;
  Net.players.set(p.id,{
    id:p.id, name:p.name, color:p.color, order:p.order||'ember',
    x:0,y:0,tx:0,ty:0, aim:0,
    hp:O.hp, maxhp:O.hp, alive:true, kills:0,
    atkT:0, face:1,
    up:{ dmg:0, hp:0, spd:0, cd:0, area:0, art:0 },   // upgrades chosen at level-ups
  });
  if(Net.onRoster) Net.onRoster();
}
function removePlayer(id){ Net.players.delete(id); Net.conns.delete(id); if(Net.onRoster) Net.onRoster(); }

let lastSend=0;
function sendPosition(now){
  if(now-lastSend<1000/WORLD.SEND_HZ) return;
  lastSend=now;
  const me=Net.players.get(Net.myId); if(!me) return;
  const msg={t:'pos',id:Net.myId,x:Math.round(me.x),y:Math.round(me.y),a:me.aim};
  if(Net.isHost) sendAll(msg); else sendHost(msg);
}

  spectateIdx:0, banner:null, over:false,
  teamBuff:0,        // seconds of Charge Shrine damage surge (party-wide)
  allies:[],         // fey dragons summoned by shrines
  relics:[],         // buried Wyrmhoard relics — first finder keeps them
  draft:null,        // shared level-up: {choices, picked:Set} — pauses everyone
  paused:false,
};
function amAlive(){ const me=Net.players.get(Net.myId); return me && me.alive; }
function myOrder(){ const me=Net.players.get(Net.myId); return ORDERS[me?me.order:'ember']||ORDERS.ember; }

function beginGame(){
  if(Net.started) return;
  Net.started=true;
  if(Net.isHost) sendAll({t:'start'});
  G.rng=mulberry32(Net.seed);
  // spawn everyone in a ring
  const ids=[...Net.players.keys()];
  ids.forEach((id,i)=>{
    const p=Net.players.get(id);
    const a=(i/Math.max(1,ids.length))*Math.PI*2;
    p.x=Math.cos(a)*70; p.y=Math.sin(a)*70; p.tx=p.x; p.ty=p.y;
    const O=ORDERS[p.order]||ORDERS.ember;
    p.hp=O.hp; p.maxhp=O.hp; p.alive=true;
  });
  const me=Net.players.get(Net.myId);
  if(me){ G.cam.x=me.x; G.cam.y=me.y; }
  // host seeds the shrines deterministically so everyone sees them in the same place
  // deterministic from the shared seed, so every client generates the SAME
  // shrines in the same places — the host then owns their charge progress
  seedShrines();
  seedRelics();
  document.getElementById('app').style.display='none';
  document.getElementById('game').classList.add('on');
  resize(); G.running=true; lastT=performance.now();
  banner('THE HUNT BEGINS','hold together');
  requestAnimationFrame(loop);
}

function banner(text,sub){
  G.banner={text,sub,life:3};
  const el=document.getElementById('banner');
  el.innerHTML=text+(sub?`<div class="b-sub">${sub}</div>`:'');
  el.classList.add('on');
}

let lastT=performance.now();
function loop(now){
  if(!G.running) return;
  const dt=Math.min(0.05,(now-lastT)/1000); lastT=now;
  // A crash in here used to freeze the screen with no explanation. Now it
  // surfaces the error so it can actually be diagnosed.
  try{
    update(dt,now); render();
  }catch(err){
    G.running=false;
    console.error(err);
    showFatal(err);
    return;
  }
  requestAnimationFrame(loop);
}
function showFatal(err){
  let el=document.getElementById('fatal');
  if(!el){
    el=document.createElement('div');
    el.id='fatal';
    el.style.cssText='position:fixed;inset:auto 12px 60px 12px;z-index:99;background:rgba(30,6,6,.95);'+
      'border:1px solid #C0503A;color:#FFD3C8;font-family:var(--mono);font-size:.7rem;padding:1rem;line-height:1.6';
    document.body.appendChild(el);
  }
  el.innerHTML='<b style="color:#E0663D">The hunt hit an error</b><br>'+
    String(err && err.message ? err.message : err)+
    '<br><span style="color:#9A927F">Reload to try again — and tell the developer this message.</span>';
}

// ---------------------------------------------------------------------
//  UPDATE
// ---------------------------------------------------------------------
function update(dt,now){
  // --- SHARED DRAFT: the world holds still while the party chooses ---
  if(G.draft){
    G.draft.t-=dt;
    if(Math.ceil(G.draft.t)!==G.draft._shown){ G.draft._shown=Math.ceil(G.draft.t); renderDraft(); }
    // the host ends it when time runs out so one idle friend can't stall the run
    if(Net.isHost && G.draft.t<=0) hostCloseDraft();
    updateHUD();
    return;
  }
  G.t+=dt;
  if(G.banner){ G.banner.life-=dt; if(G.banner.life<=0){ G.banner=null; document.getElementById('banner').classList.remove('on'); } }

  const me=Net.players.get(Net.myId);
  // --- my own movement (always local, so input feels instant) ---
  if(me && me.alive){
    let mx=(keys['d']?1:0)-(keys['a']?1:0);
    let my=(keys['s']?1:0)-(keys['w']?1:0);
    if(mx||my){
      const l=Math.hypot(mx,my); mx/=l; my/=l;
      const O=ORDERS[me.order]||ORDERS.ember;
      me.x+=mx*O.speed*pSpd(me)*dt; me.y+=my*O.speed*pSpd(me)*dt;
      if(mx) me.face=mx>0?1:-1;
    }
    me.tx=me.x; me.ty=me.y;
  }
  // --- interpolate everyone else toward their last reported position ---
  for(const p of Net.players.values()){
    if(p.id===Net.myId) continue;
    const dx=p.tx-p.x;
    if(Math.abs(dx)>1) p.face = dx>0 ? 1 : -1;   // face the way they're moving
    p.x+=dx*Math.min(1,dt*12);
    p.y+=(p.ty-p.y)*Math.min(1,dt*12);
  }
  // --- camera: follow me, or whoever I'm spectating ---
  const watch = amAlive() ? me : spectateTarget();
  if(watch){ G.cam.x+=(watch.x-G.cam.x)*Math.min(1,dt*8); G.cam.y+=(watch.y-G.cam.y)*Math.min(1,dt*8); }

  // --- my attacks (everyone fires their own art; host resolves damage) ---
  if(me && me.alive) tickMyAttack(dt);

  // --- bullets move on every client (visual), but only the host scores hits ---
  tickBullets(dt);
  tickFx(dt);
  tickShrines(dt);
  tickRelics();
  // relic regen — a slow trickle back for whoever found the Tide Pearl
  for(const p of Net.players.values())
    if(p.alive && p.regen) p.hp=Math.min(p.maxhp,p.hp+p.regen*dt);
  if(G.teamBuff>0) G.teamBuff=Math.max(0,G.teamBuff-dt);
  tickAllies(dt);

  // --- HOST ONLY: the authoritative world simulation ---
  if(Net.isHost && !G.over){
    hostSpawn(dt);
    hostMoveEnemies(dt);
    hostSnapshot(now);
    // VICTORY: hold out to the tenth minute with anyone still standing
    if(G.t>=WORLD.RUN_LENGTH){
      G.over=true;
      hostEvent({t:'ev',k:'victory',lv:G.lv,kills:G.kills,gt:Math.round(G.t)});
    }
    // one-time warnings so the finish line is felt
    if(!G._warn5 && G.t>=WORLD.RUN_LENGTH-300){ G._warn5=true; hostEvent({t:'ev',k:'say',h:'HALFWAY',s:'five minutes remain'}); }
    if(!G._warn1 && G.t>=WORLD.RUN_LENGTH-60){ G._warn1=true; hostEvent({t:'ev',k:'say',h:'ONE MINUTE',s:'hold together'}); }
  }
  sendPosition(now);
  updateHUD();
}

// ---- attacks -------------------------------------------------------
function tickMyAttack(dt){
  const me=Net.players.get(Net.myId); const O=ORDERS[me.order]||ORDERS.ember;
  me.atkT-=dt;
  if(me.atkT>0) return;
  const target=nearestEnemy(me.x,me.y,560);
  const ang = target ? Math.atan2(target.y-me.y,target.x-me.x) : (me.face>=0?0:Math.PI);
  me.aim=ang;
  broadcastAttack(O.art,ang);   // so teammates see my art, not silence
  switch(O.art){
    case 'bolt':
      me.atkT=0.62*pCd(me);
      spawnBullet(me.id,me.x,me.y,Math.cos(ang)*560,Math.sin(ang)*560,10,22*O.dmg*teamPower()*pDmg(me),O.c,O.c2,2);
      break;
    case 'chain':
      me.atkT=0.85*pCd(me);
      if(target) doChain(me,target,O);
      break;
    case 'nova':
      me.atkT=1.5*pCd(me);
      spawnFx({type:'nova',x:me.x,y:me.y,r:8,max:150*pArea(me),c:O.c2,owner:me.id,dmg:26*O.dmg*teamPower()*pDmg(me),hit:new Set()});
      break;
    case 'aura':
      me.atkT=0.5*pCd(me);
      spawnFx({type:'aura',x:me.x,y:me.y,r:105*pArea(me),life:0.45,max:0.45,c:O.c2,owner:me.id,dmg:11*O.dmg*teamPower()*pDmg(me),hit:new Set()});
      break;
    case 'zone': {
      me.atkT=1.9*pCd(me);
      const t2=target||{x:me.x+Math.cos(ang)*140,y:me.y+Math.sin(ang)*140};
      spawnFx({type:'zone',x:t2.x,y:t2.y,r:92*pArea(me),life:3.2,max:3.2,c:O.c2,owner:me.id,dmg:9*O.dmg*teamPower()*pDmg(me),tick:0});
      break;
    }
    case 'orbit':
      me.atkT=2.4*pCd(me);
      spawnFx({type:'orbit',owner:me.id,life:2.4,max:2.4,c:O.c2,dmg:14*O.dmg*teamPower()*pDmg(me),n:3,ph:0,hit:new Set()});
      break;
  }
}
function doChain(me,first,O){
  let cur=first; const seen=new Set(); let from={x:me.x,y:me.y};
  for(let i=0;i<4&&cur;i++){
    seen.add(cur.id);
    spawnFx({type:'arc',x1:from.x,y1:from.y,x2:cur.x,y2:cur.y,life:0.18,max:0.18,c:O.c2});
    reportHit(cur.id,18*O.dmg*teamPower()*pDmg(me),me.id);
    from={x:cur.x,y:cur.y};
    cur=nearestEnemy(cur.x,cur.y,220,seen);
  }
}
function spawnBullet(owner,x,y,vx,vy,r,dmg,c,c2,pierce){
  G.bullets.push({owner,x,y,vx,vy,r,dmg,c,c2,pierce,life:1.6,hit:new Set()});
}
function tickBullets(dt){
  for(const b of G.bullets){
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    // hit detection runs on every client for responsiveness, but only the
    // OWNER reports it — the host is the one who actually applies damage
    if(b.owner===Net.myId){
      for(const e of G.enemies){
        if(!e.alive||b.hit.has(e.id)) continue;
        if(Math.hypot(e.x-b.x,e.y-b.y)<e.r+b.r){
          b.hit.add(e.id); reportHit(e.id,b.dmg,b.owner);
          if(--b.pierce<=0){ b.life=0; break; }
        }
      }
    }
  }
  G.bullets=G.bullets.filter(b=>b.life>0);
}
function spawnFx(f){ if(f.life===undefined) f.life=0.5; if(f.max===undefined) f.max=f.life; G.fx.push(f); }
function tickFx(dt){
  for(const f of G.fx){
    f.life-=dt;
    if(f.type==='nova'){ f.r+=560*dt; }
    if(f.type==='orbit'){ f.ph+=dt*4.2; const o=Net.players.get(f.owner); if(o){ f.x=o.x; f.y=o.y; } }
    if(f.type==='aura'){ const o=Net.players.get(f.owner); if(o){ f.x=o.x; f.y=o.y; } }
    if(f.type==='zone'){ f.tick-=dt; }
    // only the owner reports damage; host applies it
    if(f.owner===Net.myId && f.dmg){
      if(f.type==='nova'||f.type==='aura'||f.type==='orbit'){
        const rr = f.type==='orbit' ? 62 : f.r;
        for(const e of G.enemies){
          if(!e.alive||(f.hit&&f.hit.has(e.id))) continue;
          const d=Math.hypot(e.x-f.x,e.y-f.y);
          const inRange = f.type==='orbit' ? Math.abs(d-rr)<26 : d<rr+e.r;
          if(inRange){ if(f.hit) f.hit.add(e.id); reportHit(e.id,f.dmg,f.owner); }
        }
      } else if(f.type==='zone' && f.tick<=0){
        f.tick=0.45;
        for(const e of G.enemies){
          if(!e.alive) continue;
          if(Math.hypot(e.x-f.x,e.y-f.y)<f.r+e.r) reportHit(e.id,f.dmg,f.owner);
        }
      }
    }
  }
  G.fx=G.fx.filter(f=>f.life>0);
}
// tell the host something was hit (host applies it; host's own hits apply directly)
function reportHit(enemyId,dmg,by){
  if(Net.isHost) hostApplyDamage(enemyId,dmg,by);
  else sendHost({t:'hit',id:enemyId,d:Math.round(dmg),by});
}

/* ---- SHARED LEVEL-UP DRAFT ----
   The world pauses ONCE for the whole party. Everyone picks their own upgrade
   at the same time; play resumes when all have chosen, or after a timeout so
   one AFK friend can't hold the run hostage. */
const DRAFT_TIMEOUT=20;
function openDraft(lv){
  G.paused=true;
  G.draft={ lv, picked:new Map(), mine:null, t:DRAFT_TIMEOUT };
  // three options, drawn from a seed shared by the level so it feels fair
  const r=mulberry32((Net.seed^0xBEEF)+lv*7919);
  const pool=[...UPGRADES];
  const choices=[];
  for(let i=0;i<3 && pool.length;i++) choices.push(pool.splice((r()*pool.length)|0,1)[0]);
  G.draft.choices=choices;
  renderDraft();
  document.getElementById('draft').classList.add('on');
}
function renderDraft(){
  const d=G.draft; if(!d) return;
  const me=Net.players.get(Net.myId);
  const O=me?(ORDERS[me.order]||ORDERS.ember):ORDERS.ember;
  const cards=d.choices.map(u=>{
    const name = u.id==='art' ? O.artName+' sharpened' : u.name;
    const on = d.mine===u.id ? ' on' : '';
    return `<button class="dcard${on}" data-u="${u.id}" style="--dc:${O.c}">
      <div class="d-nm">${name}</div>
      <div class="d-ds">${u.desc}</div>
    </button>`;
  }).join('');
  // who is still deciding
  const waiting=[...Net.players.values()].filter(p=>!d.picked.has(p.id)).map(p=>p.name);
  document.getElementById('draft').innerHTML=`
    <div class="d-wrap">
      <div class="d-h">Level ${d.lv}</div>
      <div class="d-sub">the whole party grows stronger — choose your own</div>
      <div class="d-cards">${cards}</div>
      <div class="d-wait">${d.mine
        ? (waiting.length ? 'waiting for: '+waiting.join(', ') : 'everyone has chosen…')
        : 'pick one to continue'} <span class="d-timer">${Math.ceil(d.t)}s</span></div>
    </div>`;
  document.querySelectorAll('.dcard').forEach(b=>{
    b.onclick=()=>{
      if(G.draft.mine) return;               // one pick each
      G.draft.mine=b.dataset.u;
      if(Net.isHost) hostReceivePick(Net.myId,b.dataset.u);
      else sendHost({t:'pick',id:Net.myId,up:b.dataset.u});
      renderDraft();
    };
  });
}
function hostReceivePick(id,upId){
  if(!G.draft) return;
  if(G.draft.picked.has(id)) return;
  G.draft.picked.set(id,upId);
  renderDraft();
  // everyone in? resume immediately
  if(G.draft.picked.size>=Net.players.size) hostCloseDraft();
}
function hostCloseDraft(){
  if(!G.draft) return;
  const picks=[...G.draft.picked.entries()];
  // anyone who didn't choose gets a sensible default rather than nothing
  for(const p of Net.players.values())
    if(!G.draft.picked.has(p.id)) picks.push([p.id,'dmg']);
  // NOTE: do NOT apply here. hostEvent() runs applyEvent() locally too, so
  // applying in both places granted every upgrade twice on the host.
  hostEvent({t:'ev',k:'resume',picks});
}
function closeDraft(){
  G.draft=null; G.paused=false;
  document.getElementById('draft').classList.remove('on');
}

// =====================================================================
//  HOST-AUTHORITATIVE SIMULATION  (only runs on the host)
// =====================================================================
const ENEMY_KINDS={
  drake:      {r:13,hp:16,sp:74, dmg:9, xp:1, c:'#8C4A3A',c2:'#D98E62'},
  wyvern:     {r:14,hp:13,sp:104,dmg:8, xp:2, c:'#7A6BA8',c2:'#C0B2E8', fly:true},
  salamander: {r:12,hp:20,sp:66, dmg:11,xp:2, c:'#C4542E',c2:'#FFB067'},
  brute:      {r:19,hp:52,sp:52, dmg:16,xp:5, c:'#6E7B52',c2:'#B8C98A'},
};
const KIND_KEYS=Object.keys(ENEMY_KINDS);

function hostSpawn(dt){
  if(G.enemies.length>=WORLD.MAX_ENEMIES) return;
  // difficulty ramps with time and with how many slayers are alive
  const alive=[...Net.players.values()].filter(p=>p.alive).length||1;
  const perSec=(1.5+G.t/45)*(0.7+0.35*alive);
  G.spawnAcc+=perSec*dt;
  while(G.spawnAcc>=1){
    G.spawnAcc-=1;
    // pick a kind, weighted toward tougher ones later
    const roll=G.rng();
    let kind='drake';
    if(G.t>60 && roll>0.72) kind='wyvern';
    if(G.t>120 && roll>0.88) kind='salamander';
    if(G.t>180 && roll>0.955) kind='brute';
    // spawn off-screen around a random living player
    const targets=[...Net.players.values()].filter(p=>p.alive);
    const anchor=targets.length?targets[(G.rng()*targets.length)|0]:{x:0,y:0};
    const a=G.rng()*6.2832, dist=620+G.rng()*180;
    const K=ENEMY_KINDS[kind];
    const scale=1+G.t/95;   // enemies get tougher as the run goes on
    G.enemies.push({
      id:G.nextId++, kind, alive:true,
      x:anchor.x+Math.cos(a)*dist, y:anchor.y+Math.sin(a)*dist,
      hp:K.hp*scale, maxhp:K.hp*scale, r:K.r, sp:K.sp, dmg:K.dmg, xp:K.xp,
      fly:!!K.fly, hitT:0, ph:G.rng()*6.28,
    });
  }
}
function hostMoveEnemies(dt){
  for(const e of G.enemies){
    if(!e.alive) continue;
    // chase the nearest LIVING player
    let best=null,bd=1e9;
    for(const p of Net.players.values()){
      if(!p.alive) continue;
      const d=Math.hypot(p.x-e.x,p.y-e.y);
      if(d<bd){ bd=d; best=p; }
    }
    if(!best) continue;
    const dx=best.x-e.x, dy=best.y-e.y, d=Math.hypot(dx,dy)||1;
    e.x+=(dx/d)*e.sp*dt; e.y+=(dy/d)*e.sp*dt;
    e.ph+=dt*(e.fly?9:5);
    if(e.hitT>0) e.hitT-=dt;
    // touching a player hurts them
    if(d<e.r+WORLD.PLAYER_R && best.hurtT===undefined) best.hurtT=0;
    if(d<e.r+WORLD.PLAYER_R){
      best.hurtT-=dt;
      if(best.hurtT<=0){ best.hurtT=0.6; hostHurtPlayer(best,e.dmg); }
    }
  }
  // separation so they don't stack into one dot
  for(let i=0;i<G.enemies.length;i++){
    const a=G.enemies[i]; if(!a.alive) continue;
    for(let j=i+1;j<Math.min(i+9,G.enemies.length);j++){
      const b=G.enemies[j]; if(!b.alive) continue;
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1;
      const min=a.r+b.r;
      if(d<min){ const push=(min-d)*0.5; a.x-=(dx/d)*push; a.y-=(dy/d)*push; b.x+=(dx/d)*push; b.y+=(dy/d)*push; }
    }
  }
  G.enemies=G.enemies.filter(e=>e.alive);
}
function hostApplyDamage(enemyId,dmg,by){
  const e=G.enemies.find(x=>x.id===enemyId);
  if(!e||!e.alive) return;
  e.hp-=dmg; e.hitT=0.1;
  if(e.hp<=0){
    e.alive=false;
    const killer=Net.players.get(by);
    if(killer) killer.kills=(killer.kills||0)+1;
    // XP is SHARED — everyone levels together, so nobody falls behind
    hostGrantXP(e.xp);
    // NOTE: no network event for the death. It was 21% of all traffic for a
    // purely cosmetic puff of particles — clients now spawn that themselves
    // when an enemy vanishes from their snapshot. Identical to look at.
    deathPuff(e.x,e.y,ENEMY_KINDS[e.kind].c2);
    G.kills++;
  }
}
function hostHurtPlayer(p,amount){
  if(!p.alive) return;
  p.hp-=amount*(1-Math.min(0.7,p.armor||0));   // armour from relics softens the blow
  // no 'hurt' event: player health already travels in every snapshot, and this
  // fired constantly (26% of all traffic) for information nobody consumed
  if(p.hp<=0){
    p.hp=0; p.alive=false;
    hostEvent({t:'ev',k:'died',id:p.id,name:p.name});
    // everyone dead? the run is over
    const anyAlive=[...Net.players.values()].some(q=>q.alive);
    if(!anyAlive) hostEvent({t:'ev',k:'wipe'});
  }
}
/* Levelling is SHARED: everyone levels together, and the world pauses ONCE
   while each slayer picks their own upgrade. One pause for the party rather
   than one person's menu freezing everyone else mid-fight. */
function hostGrantXP(n){
  if(G.draft) return;              // no XP while the party is choosing
  G.xp+=n;
  if(G.xp>=G.xpNext){
    G.xp-=G.xpNext; G.lv++; G.xpNext=Math.round(G.xpNext*1.32+3);
    hostEvent({t:'ev',k:'draft',lv:G.lv});
  }
}
// team damage multiplier: shared levels, plus any Charge Shrine surge
function teamPower(){ return (1 + (G.lv-1)*0.07) * (G.teamBuff>0 ? 1.5 : 1); }

/* The upgrade pool. Deliberately small and readable — in a co-op run you want
   to choose quickly, not read an essay while your friends wait. */
const UPGRADES=[
  { id:'art',  name:'Sharpen the Art',  desc:'your signature art strikes harder' },
  { id:'dmg',  name:"Dragon's Fang",    desc:'+12% damage' },
  { id:'hp',   name:'Heart of the Wyrm',desc:'+20 max health, healed now' },
  { id:'spd',  name:'Talon Greaves',    desc:'+8% move speed' },
  { id:'cd',   name:'Chronoscale',      desc:'strike 10% faster' },
  { id:'area', name:'Wyrm Sigil',       desc:'+15% reach and area' },
];
function applyUpgrade(p,id){
  if(!p.up) p.up={dmg:0,hp:0,spd:0,cd:0,area:0,art:0};
  p.up[id]=(p.up[id]||0)+1;
  if(id==='hp'){ p.maxhp+=20; p.hp=Math.min(p.maxhp,p.hp+20); }
}
// per-player multipliers derived from their chosen upgrades
function pDmg(p){ return (1+(p.up?.dmg||0)*0.12) * (1+(p.up?.art||0)*0.22); }
function pSpd(p){ return 1+(p.up?.spd||0)*0.08; }
function pCd(p){ return Math.max(0.35, 1-(p.up?.cd||0)*0.10); }
function pArea(p){ return 1+(p.up?.area||0)*0.15; }
function hostEvent(ev){ sendAll(ev); applyEvent(ev); }

// world snapshot — the heart of host-authority
/* World snapshot — the heart of host-authority.
   Sent PER PEER, containing only the enemies near that player. Broadcasting
   every enemy to everyone cost ~177 KB/s upload with five players, which a
   typical home connection cannot sustain; culling per recipient cuts that
   dramatically because players are usually spread out. */
const SNAP_RANGE = 1100;          // only sync enemies this close to a player
let lastSnap=0;
function hostSnapshot(now){
  if(now-lastSnap<1000/WORLD.SNAP_HZ) return;
  lastSnap=now;
  // shared fields, identical for everyone
  const players=[...Net.players.values()].map(p=>[p.id,Math.round(p.hp),p.alive?1:0,p.kills||0]);
  const shrines=G.shrines.map(s=>[s.id,Math.round(s.prog*100),s.used?1:0]);
  const live=G.enemies.filter(e=>e.alive);
  for(const [pid,conn] of Net.conns){
    const who=Net.players.get(pid);
    // if we don't know where they are, fall back to a capped global view
    const near = who
      ? live.filter(e=>Math.abs(e.x-who.x)<SNAP_RANGE && Math.abs(e.y-who.y)<SNAP_RANGE)
      : live.slice(0,120);
    // NOTE: game time is 'gt' — 't' is the message type and must not be reused
    try{
      conn.send({
        t:'snap',
        e:near.slice(0,140).map(e=>[e.id,Math.round(e.x),Math.round(e.y),e.kind[0],Math.round(e.hp)]),
        p:players, s:shrines,
        r:G.relics.filter(r=>r.taken).map(r=>r.id),
        xp:G.xp, lv:G.lv, xn:G.xpNext, gt:Math.round(G.t),
      });
    }catch(err){}
  }
}
const KIND_BY_LETTER={d:'drake',w:'wyvern',s:'salamander',b:'brute'};
function applySnapshot(d){
  if(Net.isHost) return;   // the host IS the truth; never overwrite itself
  // reconcile enemies: update known, add new, drop missing
  const seen=new Set();
  for(const [id,x,y,kl,hp] of d.e){
    seen.add(id);
    let e=G.enemies.find(q=>q.id===id);
    const kind=KIND_BY_LETTER[kl]||'drake';
    if(!e){
      const K=ENEMY_KINDS[kind];
      e={id,kind,alive:true,x,y,tx:x,ty:y,hp,maxhp:hp,r:K.r,sp:K.sp,dmg:K.dmg,xp:K.xp,fly:!!K.fly,hitT:0,ph:Math.random()*6.28};
      G.enemies.push(e);
    } else { e.tx=x; e.ty=y; e.hp=hp; }
  }
  G.enemies=G.enemies.filter(e=>{
    if(seen.has(e.id)) return true;
    // it vanished from the host's view — it either died or left our bubble.
    // Puff it either way; a kill you can't see costs nothing to render.
    deathPuff(e.x,e.y,(ENEMY_KINDS[e.kind]||ENEMY_KINDS.drake).c2);
    G.kills++;
    return false;
  });
  // players
  for(const [id,hp,alive,kills] of d.p){
    const p=Net.players.get(id);
    if(p){ p.hp=hp; p.alive=!!alive; p.kills=kills; }
  }
  G.xp=d.xp; G.lv=d.lv; G.xpNext=d.xn; G.t=d.gt;
  for(const rid of (d.r||[])){ const rel=G.relics.find(q=>q.id===rid); if(rel) rel.taken=true; }
  for(const [id,prog,used] of (d.s||[])){
    const s=G.shrines.find(q=>q.id===id);
    if(s){ s.prog=prog/100; s.used=!!used; }
  }
}
// a small burst of scales where something died — purely local, never networked
function deathPuff(x,y,c){
  for(let i=0;i<8;i++){ const a=Math.random()*6.28, sp=60+Math.random()*160;
    G.fx.push({type:'p',x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.4,max:.4,c,r:2+Math.random()*2}); }
}
function applyEvent(d){
  switch(d.k){
    case 'died': {
      const p=Net.players.get(d.id); if(p){ p.alive=false; p.hp=0; }
      banner(d.id===Net.myId?'YOU FELL':(d.name+' HAS FALLEN'),
             d.id===Net.myId?'a friend must charge a revive shrine':'find a revive shrine');
      if(d.id===Net.myId) G.spectateIdx=0;
      break;
    }
    case 'revived': {
      const p=Net.players.get(d.id); if(p){ p.alive=true; p.hp=d.hp; p.x=d.x; p.y=d.y; p.tx=d.x; p.ty=d.y; }
      banner(d.id===Net.myId?'YOU RISE':(p?p.name:'a slayer')+' RETURNS','the shrine gives back');
      break;
    }
    case 'level':
      G.lv=d.lv;
      // max health isn't in the snapshot, so apply the level-up boost locally too
      if(d.hpUp) for(const p of Net.players.values()){ p.maxhp+=d.hpUp; p.hp=Math.min(p.maxhp,p.hp+d.hpUp); }
      banner('LEVEL '+d.lv, d.hpUp ? 'the party grows hardier' : 'your arts bite deeper');
      break;
    case 'draft':
      G.lv=d.lv;
      openDraft(d.lv);
      break;
    case 'resume':
      // the host says everyone has chosen (or time ran out)
      if(d.picks) for(const [pid,upId] of d.picks){
        const p=Net.players.get(pid); if(p) applyUpgrade(p,upId);
      }
      closeDraft();
      break;
    case 'relic': {
      const rel=G.relics.find(r=>r.id===d.rid);
      if(rel){ rel.taken=true; rel.by=d.who; }
      const R=RELICS[d.kind];
      // apply the boon locally too, so joiners see their own stats change
      const p=Net.players.get(d.who);
      if(p && R && R.apply && !Net.isHost) R.apply(p);
      banner(d.who===Net.myId ? 'YOU CLAIM '+(R?R.name.toUpperCase():'A RELIC')
                              : d.name+' CLAIMS '+(R?R.name.toUpperCase():'A RELIC'),
             R?R.boon:'');
      break;
    }
    case 'say': banner(d.h,d.s); break;
    case 'buff':
      G.teamBuff=d.dur;
      banner('THE PARTY IS CHARGED','every art bites harder');
      break;
    case 'fey':
      G.allies.push({x:d.x,y:d.y,life:22,fireT:0});
      banner('A FEY DRAGON WAKES','it hunts beside you');
      break;
    case 'feyshot':
      G.fx.push({type:'arc',x1:d.x,y1:d.y,x2:d.tx,y2:d.ty,life:.16,max:.16,c:'#C6E39A'});
      break;
    case 'victory': G.over=true; showEnd(true); break;
    case 'wipe': G.over=true; showEnd(false); break;
    case 'shrine': banner('A SHRINE AWAKENS','the fallen return'); break;
  }
}

/* End-of-run summary. Shows how the party did and what each slayer
   contributed — the thing you actually talk about afterwards. */
function showEnd(won){
  G.running=false;
  const mins=Math.floor(G.t/60), secs=Math.floor(G.t%60);
  const tstr=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  const roster=[...Net.players.values()].sort((a,b)=>(b.kills||0)-(a.kills||0));
  const rows=roster.map((p,i)=>{
    const O=ORDERS[p.order]||ORDERS.ember;
    return `<div class="e-row">
      <span class="e-rank">${i+1}</span>
      <span class="e-nm" style="color:${O.c}">${p.name}</span>
      <span class="e-or">${O.name}</span>
      <span class="e-k">${p.kills||0} slain</span>
      <span class="e-st">${p.alive?'stood':'fell'}</span>
    </div>`;
  }).join('');
  let el=document.getElementById('endscreen');
  if(!el){ el=document.createElement('div'); el.id='endscreen'; document.body.appendChild(el); }
  el.innerHTML=`
    <div class="e-wrap">
      <h1 style="color:${won?'#8FE3A0':'#E0663D'}">${won?'THE HUNT IS WON':'THE SWARM TAKES YOU ALL'}</h1>
      <div class="e-sub">${won?'you held to the tenth minute':'the hunt ends here'}</div>
      <div class="e-stats">
        <div>SURVIVED<b>${tstr}</b></div>
        <div>SLAIN<b>${G.kills}</b></div>
        <div>LEVEL<b>${G.lv}</b></div>
      </div>
      <div class="e-roster">${rows}</div>
      <button class="btn" id="btn-again">Hunt Again</button>
    </div>`;
  el.classList.add('on');
  const again=document.getElementById('btn-again');
  if(again) again.onclick=()=>location.reload();
}

// =====================================================================
//  REVIVE SHRINES — a living slayer charges one to bring the fallen back
// =====================================================================
/* Four shrine types. Benefits are SHARED by the whole party — charging one is a
   team act, not a personal pickup. The single exception is the Fey Dragon,
   which summons exactly one ally no matter how many slayers are standing there;
   five dragons from one shrine would trivialise the fight. */
const SHRINE_TYPES={
  revive: { name:'Revive Shrine',    c:'#FFD860', c2:'#FFF6D0', hold:7, tip:'raises every fallen slayer' },
  charge: { name:'Charge Shrine',    c:'#2C59FA', c2:'#8FB0FF', hold:5, tip:'the party strikes harder' },
  feydragon:{ name:'Fey Dragon Shrine', c:'#5FBF6F', c2:'#C6E39A', hold:5, tip:'wakes a single dragon ally' },
  lodestone:{ name:'Lodestone Shrine',  c:'#B58CE6', c2:'#DDBBFF', hold:5, tip:'a surge of shared experience' },
};
const SHRINE_KEYS=['revive','charge','feydragon','lodestone'];
const SHRINE_R=110;
function seedShrines(){
  // deterministic placement so every client draws them identically
  const r=mulberry32(Net.seed^0x9E3779B9);
  G.shrines=[];
  for(let i=0;i<18;i++){
    const a=r()*6.2832, dist=500+r()*2600;
    const kind=SHRINE_KEYS[(r()*SHRINE_KEYS.length)|0];
    G.shrines.push({id:i,kind,x:Math.cos(a)*dist,y:Math.sin(a)*dist,prog:0,used:false});
  }
}
function tickShrines(dt){
  if(!Net.isHost) return;   // the host owns shrine progress; clients just render it
  const anyDead=[...Net.players.values()].some(p=>!p.alive);
  for(const s of G.shrines){
    if(s.used) continue;
    const T=SHRINE_TYPES[s.kind]||SHRINE_TYPES.revive;
    // a revive shrine is inert while nobody is down
    if(s.kind==='revive' && !anyDead){ s.prog=Math.max(0,s.prog-dt/T.hold); continue; }
    // is a LIVING slayer standing in it? (the dead cannot charge)
    let occupied=false;
    for(const p of Net.players.values()){
      if(p.alive && Math.hypot(p.x-s.x,p.y-s.y)<SHRINE_R){ occupied=true; break; }
    }
    if(occupied){
      s.prog+=dt/T.hold;
      if(s.prog>=1){ s.prog=1; s.used=true; fireShrine(s); }
    } else if(s.prog>0){
      s.prog=Math.max(0,s.prog-dt/T.hold);   // drains rather than resets
    }
  }
}
// resolve a charged shrine — host only, then announced to everyone
function fireShrine(s){
  switch(s.kind){
    case 'revive': {
      for(const p of Net.players.values()){
        if(p.alive) continue;
        const O=ORDERS[p.order]||ORDERS.ember;
        p.alive=true; p.hp=Math.round(p.maxhp*0.5);
        p.x=s.x+(Math.random()*40-20); p.y=s.y+(Math.random()*40-20);
        p.tx=p.x; p.ty=p.y;
        hostEvent({t:'ev',k:'revived',id:p.id,hp:p.hp,x:Math.round(p.x),y:Math.round(p.y)});
      }
      break;
    }
    case 'charge': {
      // SHARED: the whole party's arts bite harder for a while
      G.teamBuff=Math.max(G.teamBuff||0,30);
      hostEvent({t:'ev',k:'buff',dur:30});
      break;
    }
    case 'lodestone': {
      // SHARED: a burst of experience for everyone at once
      hostGrantXP(Math.max(6,Math.round(G.xpNext*0.6)));
      hostEvent({t:'ev',k:'say',h:'THE LODESTONE CALLS',s:'experience floods the party'});
      break;
    }
    case 'feydragon': {
      // NOT shared-multiplied: exactly one ally, wherever the shrine stands
      G.allies.push({x:s.x,y:s.y,life:22,fireT:0});
      hostEvent({t:'ev',k:'fey',x:Math.round(s.x),y:Math.round(s.y)});
      break;
    }
  }
}

/* Fey dragon allies. One per shrine, no matter how many slayers charged it.
   It drifts near the party and spits at whatever is closest. Only the host
   scores its hits; every client renders it from the same shrine event. */
function tickAllies(dt){
  for(const a of G.allies){
    a.life-=dt;
    let best=null,bd=1e9;
    for(const p of Net.players.values()){
      if(!p.alive) continue;
      const d=Math.hypot(p.x-a.x,p.y-a.y);
      if(d<bd){bd=d;best=p;}
    }
    if(best){
      const dx=best.x+70-a.x, dy=best.y-50-a.y, d=Math.hypot(dx,dy)||1;
      if(d>12){ a.x+=(dx/d)*150*dt; a.y+=(dy/d)*150*dt; }
    }
    a.fireT-=dt;
    if(a.fireT<=0 && Net.isHost){
      const target=nearestEnemy(a.x,a.y,420);
      if(target){
        a.fireT=0.8;
        hostApplyDamage(target.id, 20*teamPower(), Net.myId);
        hostEvent({t:'ev',k:'feyshot',x:Math.round(a.x),y:Math.round(a.y),
                   tx:Math.round(target.x),ty:Math.round(target.y)});
      } else a.fireT=0.3;
    }
  }
  G.allies=G.allies.filter(a=>a.life>0);
}

// =====================================================================
//  SPECTATE — dead players watch teammates, arrow keys to switch
// =====================================================================
function livingPlayers(){ return [...Net.players.values()].filter(p=>p.alive); }
function spectateTarget(){
  const alive=livingPlayers();
  if(!alive.length) return null;
  G.spectateIdx=((G.spectateIdx%alive.length)+alive.length)%alive.length;
  return alive[G.spectateIdx];
}
function cycleSpectate(dir){
  const alive=livingPlayers(); if(!alive.length) return;
  G.spectateIdx=((G.spectateIdx+dir)%alive.length+alive.length)%alive.length;
}

// =====================================================================
//  RENDER
// =====================================================================
function nearestEnemy(x,y,range,exclude){
  let best=null,bd=range;
  for(const e of G.enemies){
    if(!e.alive||(exclude&&exclude.has(e.id))) continue;
    const d=Math.hypot(e.x-x,e.y-y);
    if(d<bd){ bd=d; best=e; }
  }
  return best;
}
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=biome().bg; ctx.fillRect(0,0,W,H);
  const ox=W/2-G.cam.x, oy=H/2-G.cam.y;
  ctx.save(); ctx.translate(ox,oy);

  drawGround();
  drawShrines();

  // ground effects first
  for(const f of G.fx){
    if(f.type==='zone'){
      const k=f.life/f.max;
      ctx.globalAlpha=.16+.14*k; ctx.fillStyle=f.c;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,6.2832); ctx.fill();
      ctx.globalAlpha=1;
      ctx.strokeStyle=f.c; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,6.2832); ctx.stroke();
    }
  }
  // enemies — the same pixel dragons as single-player
  const halfW=W/2+70, halfH=H/2+70;
  for(const e of G.enemies){
    if(!e.alive) continue;
    if(Math.abs(e.x-G.cam.x)>halfW||Math.abs(e.y-G.cam.y)>halfH) continue;
    // joiners interpolate toward the host's reported position
    if(!Net.isHost && e.tx!==undefined){ e.x+=(e.tx-e.x)*0.28; e.y+=(e.ty-e.y)*0.28; }
    const K=ENEMY_KINDS[e.kind]||ENEMY_KINDS.drake;
    const def=SPRITE[KIND_SPRITE[e.kind]||'drake'];
    const bob=Math.sin(e.ph)*(e.fly?4:1.5);
    const y=e.y+bob-(e.fly?12:0);
    // a shadow under flyers reads as "ground magic can't reach this"
    if(e.fly){
      ctx.fillStyle='rgba(0,0,0,.32)';
      ctx.beginPath(); ctx.ellipse(e.x,e.y+6,e.r*.7,e.r*.28,0,0,6.2832); ctx.fill();
    }
    const frame=(G.t*(e.fly?9:5)+e.ph|0)&1;
    const scale=(e.r*2.3)/(def.w*def.cell);
    drawSprite(def, frame, e.x, y, spritePalette({c:K.c,c2:K.c2}), scale, e.hitT>0);
  }
  // bullets + effects
  for(const b of G.bullets){
    ctx.fillStyle=b.c2; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.2832); ctx.fill();
    ctx.fillStyle=b.c;  ctx.beginPath(); ctx.arc(b.x,b.y,b.r*.55,0,6.2832); ctx.fill();
  }
  for(const f of G.fx){
    const k=Math.max(0,f.life/f.max);
    if(f.type==='nova'){
      ctx.strokeStyle=f.c; ctx.globalAlpha=k; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,6.2832); ctx.stroke(); ctx.globalAlpha=1;
    } else if(f.type==='aura'){
      ctx.strokeStyle=f.c; ctx.globalAlpha=k*.7; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(f.x,f.y,105,0,6.2832); ctx.stroke(); ctx.globalAlpha=1;
    } else if(f.type==='orbit'){
      for(let i=0;i<f.n;i++){
        const a=f.ph+(i/f.n)*6.2832;
        ctx.fillStyle=f.c;
        ctx.beginPath(); ctx.arc(f.x+Math.cos(a)*62,f.y+Math.sin(a)*62,6,0,6.2832); ctx.fill();
      }
    } else if(f.type==='arc'){
      ctx.strokeStyle=f.c; ctx.globalAlpha=k; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(f.x1,f.y1); ctx.lineTo(f.x2,f.y2); ctx.stroke(); ctx.globalAlpha=1;
    } else if(f.type==='p'){
      f.x+=f.vx*.016; f.y+=f.vy*.016;
      ctx.globalAlpha=k; ctx.fillStyle=f.c;
      ctx.fillRect(f.x-f.r/2,f.y-f.r/2,f.r,f.r); ctx.globalAlpha=1;
    }
  }
  // players
  for(const p of Net.players.values()) drawPlayer(p);
  ctx.restore();
}
function drawGround(){
  const b=biome();
  const gs=90;
  const x0=Math.floor((G.cam.x-W/2)/gs)*gs, y0=Math.floor((G.cam.y-H/2)/gs)*gs;

  // tiled biome texture if the art exists; the bg colour stands in otherwise
  const tex=groundTexture(b.tex);
  if(tex){
    const TILE=256;
    const sx=Math.floor(x0/TILE)*TILE, sy=Math.floor(y0/TILE)*TILE;
    ctx.save(); ctx.globalAlpha=.9;
    for(let x=sx;x<x0+W+TILE;x+=TILE)
      for(let y=sy;y<y0+H+TILE;y+=TILE) ctx.drawImage(tex.img,x,y,TILE,TILE);
    ctx.restore();
    ctx.save(); ctx.globalAlpha=.22; ctx.fillStyle='#000';
    ctx.fillRect(x0-TILE,y0-TILE,W+TILE*2,H+TILE*2); ctx.restore();
  }

  // lattice, tinted to the biome
  ctx.strokeStyle=b.grid; ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=x0;x<x0+W+gs*2;x+=gs){ ctx.moveTo(x,y0); ctx.lineTo(x,y0+H+gs*2); }
  for(let y=y0;y<y0+H+gs*2;y+=gs){ ctx.moveTo(x0,y); ctx.lineTo(x0+W+gs*2,y); }
  ctx.stroke();

  // scattered scenery, deterministic so every client sees the same field
  const dark=shade(b.tint,0.62), acc=shade(b.tint,0.95);
  for(let x=x0-gs;x<x0+W+gs*2;x+=gs) for(let y=y0-gs;y<y0+H+gs*2;y+=gs){
    const h=cellHash(Math.floor(x/gs),Math.floor(y/gs));
    if((h&0xff)>=44) continue;
    const px=x+((h>>>8)&63), py=y+((h>>>14)&63);
    const kind=(h>>>20)&3;
    ctx.fillStyle=dark;
    if(kind===0){                       // rock
      ctx.beginPath(); ctx.ellipse(px,py,10,7,0,0,6.2832); ctx.fill();
      ctx.fillStyle=acc; ctx.beginPath(); ctx.ellipse(px-2,py-2,5,3,0,0,6.2832); ctx.fill();
    } else if(kind===1){                // bone
      ctx.fillRect(px-9,py-1,18,3);
      ctx.beginPath(); ctx.arc(px-9,py,3,0,6.2832); ctx.fill();
      ctx.beginPath(); ctx.arc(px+9,py,3,0,6.2832); ctx.fill();
    } else if(kind===2){                // tuft
      ctx.fillRect(px-1,py-8,2,9); ctx.fillRect(px-5,py-5,2,6); ctx.fillRect(px+4,py-6,2,7);
    } else {                            // small skull
      ctx.beginPath(); ctx.arc(px,py-2,6,0,6.2832); ctx.fill();
      ctx.fillStyle='#0B0A0F';
      ctx.fillRect(px-4,py-3,2,2); ctx.fillRect(px+2,py-3,2,2);
    }
  }
}
function drawShrines(){
  const anyDead=[...Net.players.values()].some(p=>!p.alive);
  for(const s of G.shrines){
    if(Math.abs(s.x-G.cam.x)>W/2+200||Math.abs(s.y-G.cam.y)>H/2+200) continue;
    const T=SHRINE_TYPES[s.kind]||SHRINE_TYPES.revive;
    // a revive shrine only matters while someone is down
    const usable = !s.used && (s.kind!=='revive' || anyDead);
    const col = s.used ? '#4A4640' : (usable ? T.c2 : '#7A7568');
    ctx.strokeStyle=col+(usable?'':'88'); ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(s.x,s.y,SHRINE_R,0,6.2832); ctx.stroke();
    if(usable){
      const g=ctx.createRadialGradient(s.x,s.y,SHRINE_R*.4,s.x,s.y,SHRINE_R);
      g.addColorStop(0,T.c+'00'); g.addColorStop(1,T.c+'2A');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(s.x,s.y,SHRINE_R,0,6.2832); ctx.fill();
    }
    // plinth
    ctx.fillStyle='#48453F'; ctx.fillRect(s.x-20,s.y+2,40,14);
    ctx.fillStyle='#6E6A62'; ctx.fillRect(s.x-15,s.y-4,30,8);
    // a distinct silhouette per kind, so you know it from across the field
    if(!s.used){
      ctx.save(); ctx.translate(s.x,s.y-8);
      ctx.fillStyle=usable?T.c:'#6E6A62';
      if(s.kind==='charge'){            // obelisk
        ctx.beginPath(); ctx.moveTo(-6,6); ctx.lineTo(-4,-26); ctx.lineTo(4,-26); ctx.lineTo(6,6); ctx.closePath(); ctx.fill();
      } else if(s.kind==='revive'){     // winged altar
        for(const sg of [-1,1]){ ctx.beginPath(); ctx.moveTo(sg*6,2);
          ctx.quadraticCurveTo(sg*22,-12,sg*13,-24); ctx.quadraticCurveTo(sg*11,-9,sg*9,2); ctx.closePath(); ctx.fill(); }
      } else if(s.kind==='feydragon'){  // curled stone dragon
        ctx.beginPath(); ctx.ellipse(0,-4,13,9,0,0,6.2832); ctx.fill();
        ctx.beginPath(); ctx.moveTo(5,-8); ctx.lineTo(15,-22); ctx.lineTo(20,-18); ctx.lineTo(11,-4); ctx.closePath(); ctx.fill();
      } else {                          // lodestone crystal
        const bob=Math.sin(G.t*2)*3;
        ctx.beginPath(); ctx.moveTo(0,-24+bob); ctx.lineTo(9,-8+bob); ctx.lineTo(4,6+bob);
        ctx.lineTo(-4,6+bob); ctx.lineTo(-9,-8+bob); ctx.closePath(); ctx.fill();
      }
      ctx.restore();
      // glow
      const pulse=.5+.5*Math.sin(G.t*2.4);
      const gg=ctx.createRadialGradient(s.x,s.y-8,0,s.x,s.y-8,16*pulse);
      gg.addColorStop(0,usable?T.c2:'#B9B3A4'); gg.addColorStop(1,T.c2+'00');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(s.x,s.y-8,16*pulse,0,6.2832); ctx.fill();
    }
    if(s.prog>0&&!s.used){
      ctx.strokeStyle=T.c2; ctx.lineWidth=5;
      ctx.beginPath(); ctx.arc(s.x,s.y,SHRINE_R+8,-Math.PI/2,-Math.PI/2+s.prog*6.2832); ctx.stroke();
    }
    ctx.font='600 12px Georgia,serif'; ctx.textAlign='center';
    ctx.fillStyle=col;
    ctx.fillText(s.used?'spent':T.name,s.x,s.y-42);
    if(usable && !s.used){
      ctx.font='italic 10px Georgia,serif'; ctx.fillStyle=col+'AA';
      ctx.fillText(T.tip,s.x,s.y-30);
    }
  }
  // buried relics — a glint worth crossing the map for. Claimed ones vanish.
  for(const rel of G.relics){
    if(rel.taken) continue;
    if(Math.abs(rel.x-G.cam.x)>W/2+120||Math.abs(rel.y-G.cam.y)>H/2+120) continue;
    const R=RELICS[rel.kind]||RELICS.embercrown;
    const pulse=.55+.45*Math.sin(G.t*3+rel.id);
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const g=ctx.createRadialGradient(rel.x,rel.y,0,rel.x,rel.y,42*pulse);
    g.addColorStop(0,R.c+'AA'); g.addColorStop(1,R.c+'00');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(rel.x,rel.y,42*pulse,0,6.2832); ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.restore();
    // a small hoard: dark plinth with a bright gem riding above it
    const bob=Math.sin(G.t*2+rel.id)*3;
    ctx.fillStyle='#2A241E';
    ctx.beginPath(); ctx.ellipse(rel.x,rel.y+10,14,5,0,0,6.2832); ctx.fill();
    ctx.fillStyle=shade(R.c,0.5);
    ctx.beginPath();
    ctx.moveTo(rel.x,rel.y-12+bob); ctx.lineTo(rel.x+8,rel.y-1+bob);
    ctx.lineTo(rel.x,rel.y+9+bob);  ctx.lineTo(rel.x-8,rel.y-1+bob);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle=R.c;
    ctx.beginPath();
    ctx.moveTo(rel.x,rel.y-12+bob); ctx.lineTo(rel.x+8,rel.y-1+bob);
    ctx.lineTo(rel.x,rel.y-1+bob); ctx.closePath(); ctx.fill();
    ctx.font='600 11px Georgia,serif'; ctx.textAlign='center';
    ctx.fillStyle=R.c+'DD';
    ctx.fillText(R.name,rel.x,rel.y-24);
  }
  // fey dragon allies
  for(const a of G.allies){
    if(Math.abs(a.x-G.cam.x)>W/2+80||Math.abs(a.y-G.cam.y)>H/2+80) continue;
    const k=Math.min(1,a.life/2);
    ctx.globalAlpha=k;
    const g=ctx.createRadialGradient(a.x,a.y,0,a.x,a.y,34);
    g.addColorStop(0,'#5FBF6F66'); g.addColorStop(1,'#5FBF6F00');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(a.x,a.y,34,0,6.2832); ctx.fill();
    const bob=Math.sin(G.t*6)*3;
    ctx.fillStyle='#5FBF6F';
    ctx.beginPath(); ctx.ellipse(a.x,a.y+bob,13,9,0,0,6.2832); ctx.fill();
    ctx.fillStyle='#C6E39A';
    ctx.beginPath(); ctx.ellipse(a.x+6,a.y-4+bob,6,5,0,0,6.2832); ctx.fill();
    // wings
    ctx.fillStyle='#C6E39A';
    const wf=Math.sin(G.t*12)*5;
    ctx.beginPath(); ctx.moveTo(a.x-3,a.y+bob); ctx.lineTo(a.x-16,a.y-8-wf+bob); ctx.lineTo(a.x-6,a.y+2+bob); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(a.x+3,a.y+bob); ctx.lineTo(a.x+16,a.y-8-wf+bob); ctx.lineTo(a.x+6,a.y+2+bob); ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
  }
}
function drawPlayer(p){
  const O=ORDERS[p.order]||ORDERS.ember;
  if(Math.abs(p.x-G.cam.x)>W/2+80||Math.abs(p.y-G.cam.y)>H/2+80) return;
  const isMe=p.id===Net.myId;
  if(!p.alive){
    // a fallen slayer: a dim marker so friends can find you
    ctx.globalAlpha=.5;
    ctx.strokeStyle=O.c; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(p.x,p.y,WORLD.PLAYER_R,0,6.2832); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x-8,p.y-8); ctx.lineTo(p.x+8,p.y+8);
    ctx.moveTo(p.x+8,p.y-8); ctx.lineTo(p.x-8,p.y+8); ctx.stroke();
    ctx.globalAlpha=1;
    ctx.font='600 11px Georgia,serif'; ctx.textAlign='center';
    ctx.fillStyle=O.c+'99'; ctx.fillText(p.name+' — fallen',p.x,p.y-26);
    return;
  }
  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(p.x,p.y+13,12,4,0,0,6.2832); ctx.fill();
  // the actual slayer sprite, recoloured to their order
  const def=coopPlayerSprite(p.order);
  const moving=Math.abs(p.x-(p._lx||p.x))+Math.abs(p.y-(p._ly||p.y))>0.4;
  p._lx=p.x; p._ly=p.y;
  const frame=moving?((G.t*7|0)&1):0;
  const scale=(WORLD.PLAYER_R*2.4)/(def.w*def.cell);
  ctx.save();
  ctx.translate(p.x,0); ctx.scale(p.face>=0?1:-1,1); ctx.translate(-p.x,0);
  drawSprite(def, frame, p.x, p.y, playerPalette(O), scale, false);
  ctx.restore();
  // a ring under YOUR slayer so you never lose yourself in a crowd
  if(isMe){
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(p.x,p.y+13,13,4.5,0,0,6.2832); ctx.stroke();
  }
  // health pip above hurt players
  if(p.hp<p.maxhp){
    const w=30,k=Math.max(0,p.hp/p.maxhp);
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(p.x-w/2,p.y-WORLD.PLAYER_R-14,w,3);
    ctx.fillStyle=k>.35?'#5FBF6F':'#C0503A'; ctx.fillRect(p.x-w/2,p.y-WORLD.PLAYER_R-14,w*k,3);
  }
  ctx.font='600 12px Georgia,serif'; ctx.textAlign='center';
  ctx.fillStyle=isMe?'#fff':O.c2;
  ctx.fillText(p.name+(isMe?' (you)':''),p.x,p.y-WORLD.PLAYER_R-20);
}

// =====================================================================
//  HUD + WIRING
// =====================================================================
function updateHUD(){
  const me=Net.players.get(Net.myId);
  const mins=Math.floor(G.t/60), secs=Math.floor(G.t%60);
  const tstr=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
  document.getElementById('hud').innerHTML=
    `Room <b>${Net.roomCode}</b><br>${biome().name}<br>Time <b>${tstr}</b><br>Level <b>${G.lv}</b><br>Slain <b>${G.kills}</b>`+
    (G.teamBuff>0?`<br><span style="color:#8FB0FF">CHARGED ${Math.ceil(G.teamBuff)}s</span>`:'');

  // roster with health + who's down
  let rows='';
  for(const p of Net.players.values()){
    const O=ORDERS[p.order]||ORDERS.ember;
    const hpk=Math.max(0,Math.round((p.hp/p.maxhp)*100));
    rows+=`<div class="r-row${p.alive?'':' r-dead'}">
      <span style="color:${O.c}">${p.name}${p.id===Net.myId?' •':''}</span>
      <span>${p.alive?hpk+'%':'down'}</span></div>`;
  }
  document.getElementById('roster').innerHTML=rows;

  // my bars
  if(me){
    document.getElementById('hpfill').style.width=Math.max(0,(me.hp/me.maxhp)*100)+'%';
  }
  document.getElementById('xpfill').style.width=Math.min(100,(G.xp/G.xpNext)*100)+'%';

  // spectate panel
  const sp=document.getElementById('spectate');
  if(me && !me.alive && !G.over){
    const w=spectateTarget();
    sp.classList.remove('hidden');
    sp.innerHTML=`<div class="sp-h">You have fallen</div>
      <div class="sp-w">${w?('watching '+w.name):'no one left standing'}</div>
      <div class="sp-k">← → switch · a friend must charge a Revive Shrine</div>`;
  } else sp.classList.add('hidden');
}

function currentName(){
  const v=(document.getElementById('name-input').value||'').trim();
  return (v||'slayer').slice(0,14);
}
document.getElementById('btn-host').onclick=()=>{
  if(typeof Peer==='undefined'){ setStatus('PeerJS failed to load — check your connection','err'); return; }
  Net.myName=currentName(); hostRoom();
};
document.getElementById('btn-join').onclick=()=>{
  if(typeof Peer==='undefined'){ setStatus('PeerJS failed to load — check your connection','err'); return; }
  const code=(document.getElementById('join-input').value||'').trim().toUpperCase();
  if(code.length<4){ setStatus('enter a room code first','err'); return; }
  Net.myName=currentName(); joinRoom(code);
};
document.getElementById('btn-start').onclick=()=>beginGame();
document.getElementById('leave').onclick=()=>location.reload();
document.getElementById('join-input').addEventListener('input',e=>{ e.target.value=e.target.value.toUpperCase(); });

renderOrderGrid();
window.addEventListener('load',()=>{
  if(typeof Peer==='undefined') setStatus('PeerJS did not load — multiplayer needs an internet connection','err');
});
</script>
